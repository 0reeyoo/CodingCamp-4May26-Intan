<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>Expense & Budget Visualizer</h1>
      <button id="themeToggle" class="ghost-btn" type="button" aria-label="Toggle dark mode">Mode Gelap</button>
    </header>

    <section class="balance-card" aria-live="polite">
      <p class="label">Total Saldo</p>
      <h2 id="totalBalance">Rp0</h2>
      <p id="limitNotice" class="limit-notice hidden">Peringatan: total pengeluaran melewati batas yang ditentukan.</p>
    </section>

    <section class="panel">
      <h3>Tambah Transaksi</h3>
      <form id="expenseForm" class="expense-form" novalidate>
        <div class="field">
          <label for="itemName">Nama Item</label>
          <input id="itemName" name="itemName" type="text" placeholder="Contoh: Makan Siang" />
        </div>
        <div class="field">
          <label for="itemAmount">Jumlah</label>
          <input id="itemAmount" name="itemAmount" type="number" step="0.01" min="0" placeholder="Contoh: 25000" />
        </div>
        <div class="field">
          <label for="itemCategory">Kategori</label>
          <select id="itemCategory" name="itemCategory">
            <option value="">Pilih kategori</option>
            <option value="Makanan">Makanan</option>
            <option value="Transportasi">Transportasi</option>
            <option value="Hiburan">Hiburan</option>
          </select>
        </div>
        <div class="field inline-field">
          <label for="customCategory">Kategori Khusus (Opsional)</label>
          <div class="inline-group">
            <input id="customCategory" type="text" placeholder="Contoh: Belanja" />
            <button type="button" id="addCategoryBtn" class="secondary-btn">Tambah</button>
          </div>
        </div>
        <div class="field inline-field">
          <label for="sortBy">Urutkan Daftar</label>
          <select id="sortBy" name="sortBy">
            <option value="newest">Terbaru</option>
            <option value="amount-desc">Jumlah Terbesar</option>
            <option value="amount-asc">Jumlah Terkecil</option>
            <option value="category">Kategori (A-Z)</option>
          </select>
        </div>
        <div class="field inline-field">
          <label for="spendingLimit">Batas Pengeluaran (Opsional)</label>
          <input id="spendingLimit" name="spendingLimit" type="number" step="0.01" min="0" placeholder="Contoh: 500000" />
        </div>
        <button type="submit" class="primary-btn">Tambah Transaksi</button>
        <p id="formError" class="error-message hidden" role="alert"></p>
      </form>
    </section>

    <section class="grid-layout">
      <article class="panel">
        <h3>Daftar Transaksi</h3>
        <div class="transactions-scroll">
          <ul id="transactionList" class="transaction-list"></ul>
        </div>
      </article>

      <article class="panel">
        <h3>Pengeluaran per Kategori</h3>
        <div class="chart-wrap">
          <canvas id="expenseChart" aria-label="Diagram pengeluaran" role="img"></canvas>
        </div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
