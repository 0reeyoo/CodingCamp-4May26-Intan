<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <!-- Settings Bar -->
    <div class="settings-bar">
      <button class="btn-icon" id="themeToggleBtn" title="Toggle Dark Mode">🌙</button>
      <button class="btn-icon" id="settingsBtn" title="Settings">⚙️</button>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="modal-close" id="closeSettingsBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label for="userNameInput">Your Name:</label>
            <input 
              type="text" 
              id="userNameInput" 
              class="setting-input" 
              placeholder="Enter your name"
            />
          </div>
          <div class="setting-group">
            <label for="timerDurationInput">Pomodoro Duration (minutes):</label>
            <input 
              type="number" 
              id="timerDurationInput" 
              class="setting-input" 
              min="1" 
              max="120" 
              value="25"
            />
          </div>
          <button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Greeting Section -->
    <div class="greeting-card">
      <div class="time" id="currentTime">10:45:22</div>
      <div class="date" id="currentDate">Tuesday, January 27, 2026</div>
      <div class="greeting" id="greetingText">Good Morning</div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">
      <!-- Focus Timer -->
      <div class="card timer-card">
        <h2>Focus Timer</h2>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="startBtn">Start</button>
          <button class="btn btn-secondary" id="stopBtn">Stop</button>
          <button class="btn btn-secondary" id="resetBtn">Reset</button>
        </div>
      </div>

      <!-- Tasks -->
      <div class="card tasks-card">
        <h2>Tasks</h2>
        <div class="task-input-group">
          <input 
            type="text" 
            id="taskInput" 
            class="task-input" 
            placeholder="Add a new task..."
          />
          <button class="btn btn-primary" id="addTaskBtn">Add</button>
        </div>
        <div class="task-controls">
          <label>Sort by:</label>
          <select id="sortTasksSelect" class="sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="alphabetical">A-Z</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <ul class="task-list" id="taskList"></ul>
      </div>

      <!-- Quick Links -->
      <div class="card quick-links-card">
        <h2>Quick Links</h2>
        <div class="link-input-group">
          <input 
            type="text" 
            id="linkName" 
            class="link-input" 
            placeholder="Link name"
          />
          <input 
            type="url" 
            id="linkUrl" 
            class="link-input" 
            placeholder="URL"
          />
          <button class="btn btn-primary" id="addLinkBtn">Add Link</button>
        </div>
        <div class="quick-links-container" id="quickLinksContainer"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
